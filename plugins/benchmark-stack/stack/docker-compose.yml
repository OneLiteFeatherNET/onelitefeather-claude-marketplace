# benchmark-stack — local observability stack
# Start:  cd stack && docker compose up -d
# Grafana:    http://localhost:3000   (admin / admin)
# Prometheus: http://localhost:9090
# Claude Code sends OTLP to localhost:4317 (see env/ab.sh).
services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
      - ../data:/data
    ports:
      - "4317:4317"   # OTLP gRPC  <- Claude Code
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus scrape endpoint of the collector

  prometheus:
    image: prom/prometheus:v3.1.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

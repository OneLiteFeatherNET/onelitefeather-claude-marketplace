receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s

exporters:
  # For Grafana: Prometheus scrapes this endpoint.
  # resource_to_telemetry_conversion turns the resource attributes
  # (condition, run) into real metric labels — otherwise Grafana cannot group
  # by baseline/serena.
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: true
    enable_open_metrics: true

  # For the slide report: structured OTLP JSON export to a file.
  # The report parser (report/parse_otel.py) reads exactly this file.
  file:
    path: /data/metrics.json

  # For debugging: shows the exact metric names/labels in the collector log
  # (docker compose logs otel-collector). Useful to verify the PromQL names.
  debug:
    verbosity: detailed

service:
  telemetry:
    logs:
      level: info
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, file, debug]
    # Claude Code logs come along too (optional, file/debug only here).
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [file, debug]
